<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Verification Portal PEWP 2026</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

<iframe
    id="portalFrame"
    src="https://script.google.com/macros/s/AKfycbwsOY1OUDXxhGqtT4DLoMaEn7ONMq_Y1kWtsVa1m2IDebtfb5NDRUNzD38QmyJjimh3/exec"
    allowfullscreen>
</iframe>

<script>
window.onload = function () {
    const iframe = document.getElementById("portalFrame");

    if (iframe.requestFullscreen) {
        iframe.requestFullscreen().catch(err => {
            console.log("Fullscreen request blocked:", err);
        });
    }
};
</script>

</body>
</html>
